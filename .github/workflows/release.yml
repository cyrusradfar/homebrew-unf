name: Release (Promote Staging)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to promote from staging (e.g., 0.17.0)'
        required: true

permissions:
  contents: write

jobs:
  promote:
    name: Promote Staging to Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Check version consistency
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ROOT_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$ROOT_VER" != "$VERSION" ]; then
            echo "::error::Tag version ($VERSION) does not match Cargo.toml ($ROOT_VER)"
            exit 1
          fi

      - name: Download staging binaries from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Downloading staging binaries for v${VERSION}..."
          aws s3 cp "s3://downloads.unfudged.io/staging/v${VERSION}/" . --recursive
          echo "Downloaded files:"
          ls -la *.tar.gz *.deb *.dmg

      - name: Verify all expected artifacts exist
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MISSING=0
          for f in \
            "unf-v${VERSION}-aarch64-apple-darwin.tar.gz" \
            "unf-v${VERSION}-x86_64-apple-darwin.tar.gz" \
            "unf-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            "unf-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz" \
            "unf_${VERSION}_amd64.deb" \
            "unf_${VERSION}_arm64.deb" \
            "UNFUDGED-v${VERSION}-universal.dmg"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing staging artifact: $f"
              MISSING=1
            else
              echo "Found: $f ($(du -h "$f" | cut -f1))"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Staging artifacts incomplete. Run the staging workflow first: staging-v${VERSION}"
            exit 1
          fi

      - name: Copy to releases on S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          for f in unf-v${VERSION}-*.tar.gz unf_${VERSION}_amd64.deb unf_${VERSION}_arm64.deb UNFUDGED-v${VERSION}-universal.dmg; do
            aws s3 cp "$f" "s3://downloads.unfudged.io/releases/v${VERSION}/$f"
          done
          echo "Promoted to https://downloads.unfudged.io/releases/v${VERSION}/"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "v${VERSION}" \
            --title "UNFUDGED v${VERSION}" \
            --generate-notes \
            unf-v${VERSION}-*.tar.gz \
            unf_${VERSION}_amd64.deb \
            unf_${VERSION}_arm64.deb \
            UNFUDGED-v${VERSION}-universal.dmg

      - name: Generate Homebrew formula and cask
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA_ARM=$(sha256sum unf-v${VERSION}-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86=$(sha256sum unf-v${VERSION}-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX=$(sha256sum unf-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum unf-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_DMG=$(sha256sum UNFUDGED-v${VERSION}-universal.dmg | awk '{print $1}')

          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_PLACEHOLDER_ARM/${SHA_ARM}/g" \
              -e "s/SHA256_PLACEHOLDER_X86/${SHA_X86}/g" \
              -e "s/SHA256_PLACEHOLDER_LINUX/${SHA_LINUX}/g" \
              -e "s/SHA256_PLACEHOLDER_LINUX_ARM/${SHA_LINUX_ARM}/g" \
              packaging/homebrew/unf.rb > /tmp/unf.rb

          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_PLACEHOLDER_UNIVERSAL/${SHA_DMG}/g" \
              packaging/homebrew/unfudged.rb > /tmp/unfudged.rb

          echo "Generated formula:"
          cat /tmp/unf.rb
          echo ""
          echo "Generated cask:"
          cat /tmp/unfudged.rb

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Update formula and cask in this repo (same repo is the tap)
          cp /tmp/unf.rb Formula/unf.rb
          cp /tmp/unfudged.rb Casks/unfudged.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/unf.rb Casks/unfudged.rb
          git diff --cached --quiet || git commit -m "Update unf to ${VERSION}"
          git push origin HEAD:main
