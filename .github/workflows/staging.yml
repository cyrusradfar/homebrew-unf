name: Staging

on:
  push:
    tags:
      - 'staging-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.17.0)'
        required: true

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          ROOT_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          APP_VER=$(grep '^version' app/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAURI_VER=$(python3 -c "import json; print(json.load(open('app/tauri.conf.json'))['version'])")
          echo "Root:  $ROOT_VER"
          echo "App:   $APP_VER"
          echo "Tauri: $TAURI_VER"
          if [ "$ROOT_VER" != "$APP_VER" ] || [ "$ROOT_VER" != "$TAURI_VER" ]; then
              echo "::error::Version mismatch! All version strings must match."
              exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo clippy -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#staging-v}" >> $GITHUB_OUTPUT
          fi
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Verify binary runs
        if: matrix.target != 'aarch64-apple-darwin' || runner.arch == 'ARM64'
        run: ./target/${{ matrix.target }}/release/unf --version
      - name: Import Apple certificate
        if: contains(matrix.target, 'apple-darwin') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE=$(mktemp /tmp/keychain.XXXXXX.keychain-db)
          rm -f "$KEYCHAIN_FILE"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"
          security create-keychain -p "" "$KEYCHAIN_FILE"
          security set-keychain-settings "$KEYCHAIN_FILE"
          security unlock-keychain -p "" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> $GITHUB_ENV
          rm "$CERT_FILE"

      - name: Sign binary
        if: contains(matrix.target, 'apple-darwin') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          codesign --sign "Developer ID Application: Cyrus Radfar (GB8D4MHX28)" \
            --options runtime \
            --timestamp \
            --entitlements packaging/entitlements.plist \
            target/${{ matrix.target }}/release/unf
          codesign --verify --deep --strict target/${{ matrix.target }}/release/unf
          echo "Binary signed successfully"

      - name: Notarize binary
        if: contains(matrix.target, 'apple-darwin') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent target/${{ matrix.target }}/release/unf /tmp/unf-notarize.zip
          xcrun notarytool submit /tmp/unf-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          echo "Notarization complete"

      - name: Cleanup keychain
        if: always() && contains(matrix.target, 'apple-darwin')
        run: |
          if [ -n "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" || true
          fi

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../unf-v${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz unf
      - name: Build .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEB_NAME="unf_${VERSION}_amd64"
          mkdir -p "${DEB_NAME}/usr/bin" "${DEB_NAME}/DEBIAN"
          sed "s/VERSION_PLACEHOLDER/${VERSION}/" packaging/debian/control > "${DEB_NAME}/DEBIAN/control"
          cp target/${{ matrix.target }}/release/unf "${DEB_NAME}/usr/bin/unf"
          chmod 755 "${DEB_NAME}/usr/bin/unf"
          dpkg-deb --build "${DEB_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: unf-v${{ steps.version.outputs.VERSION }}-${{ matrix.target }}
          path: unf-v${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.tar.gz
      - uses: actions/upload-artifact@v4
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        with:
          name: unf_${{ steps.version.outputs.VERSION }}_amd64
          path: unf_${{ steps.version.outputs.VERSION }}_amd64.deb

  build-tauri:
    name: Build Tauri DMG
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#staging-v}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install frontend dependencies
        run: npm ci --prefix app/ui

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Install tauri-cli
        run: cargo install tauri-cli --locked

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          KEYCHAIN_FILE=$(mktemp /tmp/keychain.XXXXXX.keychain-db)
          rm -f "$KEYCHAIN_FILE"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_FILE"
          security create-keychain -p "" "$KEYCHAIN_FILE"
          security set-keychain-settings "$KEYCHAIN_FILE"
          security unlock-keychain -p "" "$KEYCHAIN_FILE"
          security import "$CERT_FILE" -k "$KEYCHAIN_FILE" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')
          echo "KEYCHAIN_FILE=$KEYCHAIN_FILE" >> $GITHUB_ENV
          rm "$CERT_FILE"

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Cyrus Radfar (GB8D4MHX28)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        working-directory: app
        run: cargo tauri build --target universal-apple-darwin --bundles dmg

      - name: Rename DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_SRC=$(find app/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG_SRC" "UNFUDGED-v${VERSION}-universal.dmg"

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_FILE" ]; then
            security delete-keychain "$KEYCHAIN_FILE" || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: UNFUDGED-v${{ steps.version.outputs.VERSION }}-universal
          path: UNFUDGED-v${{ steps.version.outputs.VERSION }}-universal.dmg

  upload-s3:
    name: Upload to S3 (downloads.unfudged.io)
    needs: [build, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#staging-v}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Upload binaries to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          for f in unf-v${VERSION}-*.tar.gz unf_${VERSION}_amd64.deb UNFUDGED-v${VERSION}-universal.dmg; do
            aws s3 cp "$f" "s3://downloads.unfudged.io/staging/v${VERSION}/$f"
          done
          echo "Uploaded to https://downloads.unfudged.io/staging/v${VERSION}/"

  staging-release:
    name: Create Staging Release
    needs: [build, build-tauri, upload-s3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#staging-v}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate staging formula and cask
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA_ARM=$(sha256sum unf-v${VERSION}-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_X86=$(sha256sum unf-v${VERSION}-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX=$(sha256sum unf-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_DMG=$(sha256sum UNFUDGED-v${VERSION}-universal.dmg | awk '{print $1}')

          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_PLACEHOLDER_ARM/${SHA_ARM}/g" \
              -e "s/SHA256_PLACEHOLDER_X86/${SHA_X86}/g" \
              -e "s/SHA256_PLACEHOLDER_LINUX/${SHA_LINUX}/g" \
              packaging/homebrew/unf-staging.rb > /tmp/unf-staging.rb

          sed -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
              -e "s/SHA256_PLACEHOLDER_UNIVERSAL/${SHA_DMG}/g" \
              packaging/homebrew/unfudged-staging.rb > /tmp/unfudged-staging.rb

          echo "Generated staging formula:"
          cat /tmp/unf-staging.rb
          echo ""
          echo "Generated staging cask:"
          cat /tmp/unfudged-staging.rb

      - name: Upload to Homebrew tap as staging release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          # Create staging pre-release with binaries on this repo
          gh release create "staging-v${VERSION}" \
            --title "unf v${VERSION} (staging)" \
            --notes "Staging build for pre-release testing. Install with: brew install cyrusradfar/unf/unf-staging" \
            --prerelease \
            unf-v${VERSION}-*.tar.gz \
            unf_${VERSION}_amd64.deb \
            UNFUDGED-v${VERSION}-universal.dmg \
            || echo "Release may already exist, attempting to upload assets..."

          # If release already existed, upload assets individually
          for f in unf-v${VERSION}-*.tar.gz unf_${VERSION}_amd64.deb UNFUDGED-v${VERSION}-universal.dmg; do
            gh release upload "staging-v${VERSION}" "$f" --clobber || true
          done

          # Update staging formula and cask in this repo (same repo is the tap)
          cp /tmp/unf-staging.rb Formula/unf-staging.rb
          cp /tmp/unfudged-staging.rb Casks/unfudged-staging.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/unf-staging.rb Casks/unfudged-staging.rb
          git diff --cached --quiet || git commit -m "Staging: unf v${VERSION}"
          git push
